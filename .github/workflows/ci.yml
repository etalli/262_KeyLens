name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode toolchain
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Verify selected developer directory
        run: |
          echo "DEVELOPER_DIR=${DEVELOPER_DIR:-<not set>}"
          xcode-select -p
          xcrun --find swift
          xcodebuild -version
          swift --version

      - name: Run unit tests
        run: |
          export DEVELOPER_DIR="$(xcode-select -p)"
          swift test

  build-dmg:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode toolchain
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Build DMG
        run: |
          export DEVELOPER_DIR="$(xcode-select -p)"
          ./build.sh --dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeyLens-dmg
          path: KeyLens.dmg.zip
          retention-days: 90

  validate-scripts:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Syntax check validate_counts.swift
        run: swiftc -parse scripts/validate_counts.swift

      - name: Syntax check check_mouse_data.sh
        run: bash -n scripts/check_mouse_data.sh

      - name: Syntax check ai_review.py
        run: python3 -m py_compile scripts/ai_review.py
