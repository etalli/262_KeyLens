name: AI repo review

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

on:
  schedule:
    - cron: "0 3 * * 1"   # weekly
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh -y

      - name: Run AI review
        run: |
          python scripts/ai_review.py > issues.txt
          echo "---- issues.txt ----"
          cat issues.txt

      - name: Create issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -s issues.txt ]; then
            echo "No issues generated"
            exit 0
          fi

          awk '/====/' RS= issues.txt | while read issue; do
            title=$(echo "$issue" | head -n1)
            body=$(echo "$issue" | tail -n +3)

            if [ -n "$title" ]; then
              gh issue create \
                --title "$title" \
                --body "$body"
            fi
          done